datapath=./dataset/Symmap/one.txt
ratings.setup=-columns 0 1 2
model.name=HDCTI
model.variant=symmap_pair_stratified_sp_fbha_pilot_v1
evaluation.setup=-cv 5
evaluation.fold.limit=1
evaluation.outer.test=False
experiment.protocol=strict
random.seed=2026
split.strategy=pair_stratified
split.seed=2026
split.dir=./dataset/Symmap/splits/strict_seed_2026_k5
split.reuse=True
early.stopping=True
validation.ratio=0.1
validation.seed=102026
validation.metric=AUPR
validation.interval=2
validation.patience=5
validation.min.delta=0.0001
pair.decoder=dot
pair.mlp.hidden=64
pair.prediction.batch.size=65536
context.interaction=True
context.compound_disease=False
context.herb_protein=True
context.herb_protein.mode=static
context.herb_disease=False
counterfactual.context=False
hyperedge.attention=True
hyperedge.attention.mode=factorized_specificity
hyperedge.attention.hc=True
hyperedge.attention.pd=True
hyperedge.attention.temperature=1.0
hyperedge.attention.prior.scale=0.1
weight.reg=0.01
num.factors=64
num.max.epoch=50
batch_size=2000
attention.max.nodes=0
gpu.id=0
gpu.allow_growth=True
gpu.multiprocessing=False
gpu.log_device_placement=False
learnRate=-init 0.005 -max 1
reg.lambda=-u 0.001 -i 0.001 -b 0.2 -s 0.2
output.setup=on -dir ./results/
